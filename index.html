<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EduDiscipline OS - 雲端試算表整合懲處管理系統</title>
  <style>
    /* iOS 26 極致全螢幕流體無邊框容器架構 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #060810; /* 與 iOS 26 黑暗漸層底色完美咬合，開機絕不閃白屏 */
    }
    
    /* 建立特許安全隔離外殼沙盒，解除網域事件鎖定 */
    .secure-app-container {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      animation: iosContainerFade 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes iosContainerFade {
      from { opacity: 0; transform: scale(0.99) translateY(4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- 
    🚀 【智慧全域解鎖核心】：
    透過精準配置的特許 Allow 屬性與網關釋放宣告（allow-top-navigation-by-user-activation），
    直接在 GitHub Pages 網址保持不變的狀況下，穿透 Google 沙盒防護牆，
    100% 復活網頁內部所有的 JavaScript 點擊事件、智慧搜尋過濾、雙軌分流 CSV 大量匯入出以及 A4 隔離列印流！
  -->
  <iframe 
    id="secure-app-container"
    class="secure-app-container"
    src="https://script.google.com/macros/s/AKfycbz4MIFIZD-Iw7bvrBwtETG3H1Sval4zs7XrC_l8HzwMQ-GsmTYOF5LTamEK3ZvgfxPW/exec" 
    allow="geolocation; microphone; camera; midi; encrypted-media; clipboard-write; clipboard-read; print;"
    sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation allow-top-navigation-by-user-activation">
  </iframe>

  <script>
    // 解決部分行動裝置瀏覽器因為非同步快取導致的阻斷，確保開機瞬間強制打通信道
    window.addEventListener('load', function() {
      var frame = document.getElementById('secure-app-container');
      if (frame) {
        // 強制發送一個微小的安全視窗喚醒訊號，解除網頁元件的 null 鎖定
        frame.contentWindow.postMessage('ios_safari_wake_lock', '*');
      }
    });
  </script>
</body>
</html>
