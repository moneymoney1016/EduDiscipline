<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EduDiscipline OS - 雲端試算表整合懲處管理系統</title>
  <style>
    /* iOS 26 極致全螢幕無邊框流體外殼 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #060810; /* 與 iOS 26 黑暗漸層底色完美咬合，開機絕不閃白屏 */
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      animation: iosContainerFade 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes iosContainerFade {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbz4MIFIZD-Iw7bvrBwtETG3H1Sval4zs7XrC_l8HzwMQ-GsmTYOF5LTamEK3ZvgfxPW/exec" 
    allow="geolocation; microphone; camera; midi; encrypted-media; clipboard-write;"
    sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation">
  </iframe>

</body>
</html>
